<IfModule mod_ssl.c>
<VirtualHost *:443>
    ProxyPass / http://0.0.0.0:8080/
    ProxyPassReverse / http://0.0.0.0:8080/
    ServerName api.kingdomdkp.com

    SSLCertificateFile /etc/letsencrypt/live/api.kingdomdkp.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.kingdomdkp.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
